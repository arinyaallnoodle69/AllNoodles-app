<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1180" viewBox="0 0 900 1180" role="img" aria-labelledby="title desc">
  <title id="title">ตัวอย่างแจ้งเตือนสอบถามราคาสินค้าในกลุ่ม LINE</title>
  <desc id="desc">Mockup หน้าจอแชท LINE group ที่มีบอทส่ง Flex message สอบถามราคาสินค้าเข้ากลุ่มแอดมิน</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#123" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="header" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#003366"/>
      <stop offset="1" stop-color="#075985"/>
    </linearGradient>
  </defs>

  <rect width="900" height="1180" fill="#edf5f2"/>
  <rect x="0" y="0" width="900" height="1180" fill="#d9f0e8"/>

  <rect x="0" y="0" width="900" height="104" fill="#06c755"/>
  <text x="78" y="44" font-family="Arial, Tahoma, sans-serif" font-size="26" font-weight="700" fill="#ffffff">กลุ่มแอดมิน T&amp;Y Noodle</text>
  <text x="78" y="76" font-family="Arial, Tahoma, sans-serif" font-size="17" fill="#eafff2">Bot แจ้งเตือนร้านค้า</text>
  <circle cx="42" cy="52" r="24" fill="#ffffff" opacity="0.22"/>
  <path d="M30 52c0-10 8-18 18-18s18 8 18 18-8 18-18 18H33l5-6c-5-3-8-7-8-12z" fill="#ffffff"/>

  <text x="450" y="154" font-family="Arial, Tahoma, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#6b7f7a">วันนี้ 12:55</text>

  <g transform="translate(70 205)">
    <circle cx="30" cy="30" r="30" fill="#06c755"/>
    <text x="30" y="39" font-family="Arial, Tahoma, sans-serif" font-size="25" font-weight="800" text-anchor="middle" fill="#ffffff">TY</text>
    <text x="76" y="22" font-family="Arial, Tahoma, sans-serif" font-size="18" font-weight="700" fill="#263b35">T&amp;Y Noodle Bot</text>
    <text x="76" y="48" font-family="Arial, Tahoma, sans-serif" font-size="15" fill="#6b7f7a">ส่งจากระบบอัตโนมัติ</text>
  </g>

  <g transform="translate(146 286)" filter="url(#shadow)">
    <rect width="610" height="566" rx="22" fill="#ffffff"/>
    <rect width="610" height="118" rx="22" fill="url(#header)"/>
    <path d="M0 96h610v44H0z" fill="url(#header)"/>
    <text x="32" y="48" font-family="Arial, Tahoma, sans-serif" font-size="27" font-weight="800" fill="#ffffff">สอบถามราคาสินค้า</text>
    <text x="32" y="82" font-family="Arial, Tahoma, sans-serif" font-size="17" fill="#bfdbfe">29 พ.ค. 2569 12:55</text>

    <g transform="translate(32 152)">
      <text x="0" y="0" font-family="Arial, Tahoma, sans-serif" font-size="17" font-weight="700" fill="#64748b">สินค้า</text>
      <text x="0" y="38" font-family="Arial, Tahoma, sans-serif" font-size="24" font-weight="800" fill="#0f172a">เส้นหมี่สด เบอร์ 1</text>
    </g>

    <line x1="32" y1="240" x2="578" y2="240" stroke="#e2e8f0" stroke-width="2"/>

    <g transform="translate(32 286)">
      <text x="0" y="0" font-family="Arial, Tahoma, sans-serif" font-size="17" font-weight="700" fill="#64748b">ลูกค้า</text>
      <text x="0" y="38" font-family="Arial, Tahoma, sans-serif" font-size="23" font-weight="800" fill="#0f172a">ร้านก๋วยเตี๋ยวเจ๊น้อย</text>
    </g>

    <g transform="translate(32 370)">
      <text x="0" y="0" font-family="Arial, Tahoma, sans-serif" font-size="16" fill="#94a3b8">ชื่อ LINE</text>
      <text x="150" y="0" font-family="Arial, Tahoma, sans-serif" font-size="16" font-weight="700" fill="#334155">Je Noi Noodle</text>
    </g>

    <g transform="translate(32 416)">
      <text x="0" y="0" font-family="Arial, Tahoma, sans-serif" font-size="16" fill="#94a3b8">LINE user</text>
      <text x="150" y="0" font-family="Arial, Tahoma, sans-serif" font-size="16" fill="#64748b">Uxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx</text>
    </g>

    <rect x="32" y="462" width="546" height="72" rx="14" fill="#eff6ff"/>
    <text x="52" y="506" font-family="Arial, Tahoma, sans-serif" font-size="19" font-weight="800" fill="#003366">กรุณาตรวจสอบและแจ้งราคากลับลูกค้า</text>
  </g>

  <g transform="translate(146 888)">
    <rect width="610" height="86" rx="18" fill="#ffffff" opacity="0.72"/>
    <text x="28" y="35" font-family="Arial, Tahoma, sans-serif" font-size="18" font-weight="700" fill="#334155">สรุปการทำงาน</text>
    <text x="28" y="63" font-family="Arial, Tahoma, sans-serif" font-size="16" fill="#64748b">ลูกค้ากดปุ่ม → บอทส่งการ์ดนี้เข้ากลุ่ม LINE แอดมินอัตโนมัติ</text>
  </g>

  <text x="450" y="1048" font-family="Arial, Tahoma, sans-serif" font-size="18" text-anchor="middle" fill="#64748b">หมายเหตุ: ข้อความนี้ส่งเข้ากลุ่มแอดมิน ไม่ใช่ส่งแทนลูกค้าในแชท OA 1:1</text>
</svg>
